openapi: 3.1.0
info:
  title: WMS API
  version: 1.0.0
  description: |
    Warehouse management system API covering authentication, master data, inventory, and operations.
servers:
  - url: http://localhost:4000/api/v1
    description: Local development
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ObjectId:
      type: string
      pattern: '^[0-9a-fA-F]{24}$'
    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    UserRole:
      type: string
      enum: [Admin, Manager, Staff]
    PartnerType:
      type: string
      enum: [supplier, customer]
    WarehouseNodeType:
      type: string
      enum: [warehouse, zone, aisle, rack, bin]
    ReceiptStatus:
      type: string
      enum: [draft, approved, supplierConfirmed, completed, rejected]
    DeliveryStatus:
      type: string
      enum: [draft, approved, prepared, delivered, completed, cancelled]
    StocktakeStatus:
      type: string
      enum: [draft, approved, applied]
    ReturnStatus:
      type: string
      enum: [draft, approved, inspected, completed]
    DisposalStatus:
      type: string
      enum: [draft, approved, completed]
    IncidentType:
      type: string
      enum: [shortage, late, damaged, rejected]
    IncidentAction:
      type: string
      enum: [replenish, return, refund]
    IncidentStatus:
      type: string
      enum: [open, inProgress, resolved]
    AdjustmentReason:
      type: string
      enum: [loss, found, correction]
    FinancialTransactionType:
      type: string
      enum: [payment, liability, refund, income, expense]
    FinancialTransactionStatus:
      type: string
      enum: [pending, completed, cancelled]
    InventoryStatus:
      type: string
      enum: [available, reserved, pending, special, quarantined]
    NotificationType:
      type: string
      enum: [info, success, warning, error]
    User:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        email:
          type: string
          format: email
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserRef:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        email:
          type: string
          format: email
        fullName:
          type: string
    AuthTokens:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
    Category:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PartnerRef:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
        code:
          type: string
        type:
          $ref: '#/components/schemas/PartnerType'
    ProductRef:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        sku:
          type: string
        name:
          type: string
        unit:
          type: string
    Product:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        sku:
          type: string
        name:
          type: string
        categoryId:
          $ref: '#/components/schemas/ObjectId'
        category:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/ObjectId'
            name:
              type: string
              nullable: true
          nullable: true
        unit:
          type: string
        priceIn:
          type: number
        priceOut:
          type: number
        minStock:
          type: number
        image:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        supplierIds:
          type: array
          items:
            $ref: '#/components/schemas/ObjectId'
        manageBySerial:
          type: boolean
        requiresQC:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Partner:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/PartnerType'
        code:
          type: string
        name:
          type: string
        taxCode:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isActive:
          type: boolean
        businessType:
          type: string
          nullable: true
        customerType:
          type: string
          nullable: true
        creditLimit:
          type: number
          nullable: true
        paymentTerm:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SupplierProduct:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        supplierId:
          anyOf:
            - $ref: '#/components/schemas/ObjectId'
            - $ref: '#/components/schemas/PartnerRef'
        productId:
          anyOf:
            - $ref: '#/components/schemas/ObjectId'
            - $ref: '#/components/schemas/ProductRef'
        supplierSku:
          type: string
          nullable: true
        priceIn:
          type: number
          nullable: true
        currency:
          type: string
        minOrderQty:
          type: number
        leadTimeDays:
          type: number
          nullable: true
        paymentTerms:
          type: string
          nullable: true
        contractRef:
          type: string
          nullable: true
        isPreferred:
          type: boolean
        status:
          type: string
          enum: [active, inactive]
        validFrom:
          type: string
          format: date-time
          nullable: true
        validTo:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WarehouseNode:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/WarehouseNodeType'
        name:
          type: string
        code:
          type: string
        parentId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        barcode:
          type: string
          nullable: true
        warehouseType:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        capacity:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WarehouseTreeNode:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/WarehouseNodeType'
        name:
          type: string
        code:
          type: string
        barcode:
          type: string
          nullable: true
        warehouseType:
          type: string
          nullable: true
        parentId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseTreeNode'
    WarehouseVisualization:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/WarehouseNodeType'
        name:
          type: string
        code:
          type: string
        children:
          type: array
          items:
            type: object
            properties:
              id:
                $ref: '#/components/schemas/ObjectId'
              type:
                $ref: '#/components/schemas/WarehouseNodeType'
              name:
                type: string
              code:
                type: string
              currentQty:
                type: number
              itemsCount:
                type: integer
              utilization:
                type: number
    InventoryItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        productId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        quantity:
          type: integer
        status:
          $ref: '#/components/schemas/InventoryStatus'
        batch:
          type: string
          nullable: true
        expDate:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    InventoryMoveRequest:
      type: object
      required: [productId, fromLocation, toLocation, qty]
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        fromLocation:
          $ref: '#/components/schemas/ObjectId'
        toLocation:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: integer
          minimum: 1
    InventoryReleaseQcRequest:
      type: object
      required: [productId, locationId, qty]
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: integer
          minimum: 1
        batch:
          type: string
          nullable: true
    ReplenishmentLine:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        sku:
          type: string
        name:
          type: string
        currentStock:
          type: number
        minStock:
          type: number
        suggestedQty:
          type: number
        priceIn:
          type: number
    ReplenishmentSuggestion:
      type: object
      properties:
        supplierId:
          $ref: '#/components/schemas/ObjectId'
        supplierName:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ReplenishmentLine'
    ReceiptLine:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: number
        priceIn:
          type: number
        locationId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        batch:
          type: string
          nullable: true
        expDate:
          type: string
          format: date-time
          nullable: true
        serials:
          type: array
          items:
            type: string
    Receipt:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        supplierId:
          $ref: '#/components/schemas/ObjectId'
        supplier:
          $ref: '#/components/schemas/PartnerRef'
        date:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ReceiptStatus'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ReceiptLine'
        notes:
          type: string
          nullable: true
        attachments:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DeliveryLine:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: number
        priceOut:
          type: number
        locationId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        serials:
          type: array
          items:
            type: string
        batch:
          type: string
          nullable: true
    Delivery:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        customerId:
          $ref: '#/components/schemas/ObjectId'
        customer:
          $ref: '#/components/schemas/PartnerRef'
        date:
          type: string
          format: date-time
        expectedDate:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/DeliveryStatus'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryLine'
        notes:
          type: string
          nullable: true
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        shippingFee:
          type: number
          nullable: true
        codAmount:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        dimensions:
          type: object
          properties:
            l:
              type: number
            w:
              type: number
            h:
              type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IncidentLine:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        quantity:
          type: integer
    Incident:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/IncidentType'
        refType:
          type: string
          enum: [receipt, delivery]
        refId:
          $ref: '#/components/schemas/ObjectId'
        status:
          $ref: '#/components/schemas/IncidentStatus'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/IncidentLine'
        note:
          type: string
          nullable: true
        action:
          $ref: '#/components/schemas/IncidentAction'
        createdBy:
          $ref: '#/components/schemas/ObjectId'
        createdAt:
          type: string
          format: date-time
    StocktakeItem:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        systemQty:
          type: number
          nullable: true
        countedQty:
          type: number
        serials:
          type: array
          items:
            type: string
    Stocktake:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        date:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/StocktakeStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/StocktakeItem'
        adjustmentId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        approvedBy:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        minutes:
          type: string
          nullable: true
        attachments:
          type: array
          items:
            type: string
    AdjustmentLine:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        delta:
          type: integer
    Adjustment:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        reason:
          $ref: '#/components/schemas/AdjustmentReason'
        status:
          type: string
          enum: [draft, completed]
        lines:
          type: array
          items:
            $ref: '#/components/schemas/AdjustmentLine'
        approvedBy:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
    ReturnItem:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: number
        reason:
          type: string
        expDate:
          type: string
          format: date-time
          nullable: true
        qcStatus:
          type: string
          enum: [pending, approved, rejected]
          nullable: true
        qcNotes:
          type: string
          nullable: true
        restockQty:
          type: number
          nullable: true
        disposeQty:
          type: number
          nullable: true
    Return:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        from:
          type: string
          enum: [customer, supplier]
        refId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        disposalId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReturnItem'
        status:
          $ref: '#/components/schemas/ReturnStatus'
        qcInspectedBy:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        qcInspectedAt:
          type: string
          format: date-time
          nullable: true
        qcNotes:
          type: string
          nullable: true
        adjustmentId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        refundTransactionId:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DisposalItem:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        qty:
          type: number
        value:
          type: number
          nullable: true
    Disposal:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        code:
          type: string
        reason:
          type: string
        totalValue:
          type: number
        boardRequired:
          type: boolean
        boardMembers:
          type: array
          items:
            type: string
        minutesFileUrl:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/DisposalStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DisposalItem'
        approvedBy:
          $ref: '#/components/schemas/ObjectId'
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        approvalNotes:
          type: string
          nullable: true
        attachments:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            type: string
    FinancialTransaction:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        partnerId:
          anyOf:
            - $ref: '#/components/schemas/ObjectId'
            - $ref: '#/components/schemas/PartnerRef'
        type:
          $ref: '#/components/schemas/FinancialTransactionType'
        status:
          $ref: '#/components/schemas/FinancialTransactionStatus'
        amount:
          type: number
        paidAmount:
          type: number
          nullable: true
        paymentDueDate:
          type: string
          format: date-time
          nullable: true
        referenceId:
          type: string
          nullable: true
        referenceType:
          type: string
          enum: [Receipt, Delivery, Return, Manual]
          nullable: true
        date:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    Notification:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        userId:
          $ref: '#/components/schemas/ObjectId'
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        actionLink:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Setting:
      type: object
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
            - type: array
        type:
          type: string
          enum: [string, number, boolean, json]
        group:
          type: string
        description:
          type: string
          nullable: true
        isPublic:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    AuditLog:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        action:
          type: string
        entity:
          type: string
        entityId:
          type: string
        actor:
          $ref: '#/components/schemas/UserRef'
          nullable: true
        payload:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
    UploadImageResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
        mimetype:
          type: string
        size:
          type: integer
    AllocationPick:
      type: object
      properties:
        inventoryId:
          $ref: '#/components/schemas/ObjectId'
        locationId:
          $ref: '#/components/schemas/ObjectId'
        batch:
          type: string
          nullable: true
        expDate:
          type: string
          format: date-time
          nullable: true
        quantity:
          type: number
    AllocationResult:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        picks:
          type: array
          items:
            $ref: '#/components/schemas/AllocationPick'
        totalPicked:
          type: number
        error:
          type: string
          nullable: true
    ReportOverview:
      type: object
      properties:
        counts:
          type: object
          properties:
            products:
              type: integer
            pendingReceipts:
              type: integer
            pendingDeliveries:
              type: integer
            openIncidents:
              type: integer
            expiringSoon:
              type: integer
        totalInventoryValue:
          type: number
        revenueChart:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              income:
                type: number
              expense:
                type: number
        inventoryStatus:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: number
        abcAnalysis:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: number
        predictiveInsights:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              sku:
                type: string
              daysLeft:
                type: number
              velocity:
                type: string
    ReportInventoryRow:
      type: object
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        sku:
          type: string
        name:
          type: string
        totalQty:
          type: number
        minStock:
          type: number
        status:
          type: string
    ReportInboundRow:
      type: object
      properties:
        date:
          type: string
        totalQty:
          type: number
        documents:
          type: integer
    ReportOutboundRow:
      type: object
      properties:
        date:
          type: string
        totalQty:
          type: number
        documents:
          type: integer
    ReportStocktakeRow:
      type: object
      properties:
        code:
          type: string
        status:
          type: string
        date:
          type: string
